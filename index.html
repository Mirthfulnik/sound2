<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0a0a0f"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="SkySound"/>
  <title>SkySound Player</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" href="assets/icon-192.png" type="image/png"/>
  <link rel="apple-touch-icon" href="assets/icon-192.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ══ APP SHELL ══════════════════════════════════════════════ -->
<div class="app-shell">

  <!-- ── SCREENS ──────────────────────────────────────────── -->
  <main class="screens">

    <!-- SCREEN 1: МОЯ ВОЛНА -->
    <section class="view active" id="view-wave">
      <div class="screen-inner">
        <header class="screen-header">
          <h1 class="screen-title">Моя волна</h1>
          <p class="screen-sub">Авторадио по вашему настроению</p>
        </header>

        <div class="wave-card">
          <!-- Genre -->
          <div class="filter-group">
            <label class="filter-label">Жанр</label>
            <select id="waveGenre" class="filter-select"></select>
          </div>

          <!-- Mood -->
          <div class="filter-group">
            <label class="filter-label">Настроение</label>
            <div class="mood-tabs">
              <button class="mood-tab active" data-mood="all"       onclick="selectMood(this)">Всё</button>
              <button class="mood-tab"        data-mood="energetic" onclick="selectMood(this)">Энергично</button>
              <button class="mood-tab"        data-mood="calm"      onclick="selectMood(this)">Спокойно</button>
            </div>
            <input type="hidden" id="waveMood" value="all"/>
          </div>

          <!-- Skip played -->
          <label class="filter-check">
            <input type="checkbox" id="waveSkipPlayed"/>
            <span>Пропускать уже прослушанные</span>
          </label>

          <!-- Launch button -->
          <button class="wave-btn" id="wavePlayBtn">▶ Запустить волну</button>

          <!-- Spinner -->
          <div class="wave-spinner hidden" id="waveSpinner">
            <div class="spinner"></div>
          </div>

          <!-- Now playing -->
          <div class="wave-now-playing hidden" id="waveNowPlaying">
            <div class="wave-eq">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
            <div class="wave-track-name" id="waveTrackName">—</div>
          </div>
        </div>
      </div>
    </section>

    <!-- SCREEN 2: ПОИСК -->
    <section class="view" id="view-search">
      <div class="screen-inner">
        <header class="screen-header">
          <h1 class="screen-title">Поиск</h1>
        </header>

        <div class="search-bar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" id="searchInput" placeholder="Исполнитель или название..." autocomplete="off"/>
          <button id="searchBtn">Найти</button>
        </div>

        <!-- Genre tabs -->
        <div class="genre-tabs">
          <button class="genre-tab active" data-genre="">Топ</button>
          <button class="genre-tab" data-genre="dance">Dance</button>
          <button class="genre-tab" data-genre="rap">Rap</button>
          <button class="genre-tab" data-genre="alternative">Альтернатива</button>
          <button class="genre-tab" data-genre="rock">Рок</button>
          <button class="genre-tab" data-genre="classical">Классика</button>
          <button class="genre-tab" data-genre="jazz">Jazz</button>
          <button class="genre-tab" data-genre="blues">Blues</button>
          <button class="genre-tab" data-genre="singer">Авторская</button>
          <button class="genre-tab" data-genre="instrumental">Инструментал</button>
        </div>

        <div class="track-list" id="searchResults">
          <div class="empty-state">
            <div class="empty-icon">♪</div>
            <p>Введите запрос или выберите жанр</p>
          </div>
        </div>
      </div>
    </section>

    <!-- SCREEN 3: ИЗБРАННОЕ -->
    <section class="view" id="view-favorites">
      <div class="screen-inner">
        <header class="screen-header">
          <h1 class="screen-title">Избранное</h1>
          <p class="screen-sub" id="favCount"></p>
        </header>
        <div class="track-list" id="favoritesContainer">
          <div class="empty-state">
            <div class="empty-icon">♡</div>
            <p>Здесь появятся треки, которые вы лайкнули</p>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- ── PLAYER BAR ────────────────────────────────────────── -->
  <div class="player-bar">
    <div class="player-track">
      <div class="player-art" id="playerArt">♪</div>
      <div class="player-meta">
        <div class="player-title"  id="playerTitle">Выберите трек</div>
        <div class="player-artist" id="playerArtist">—</div>
      </div>
      <div class="player-track-actions">
        <button class="heart-btn" id="heartBtn" title="В избранное">♡</button>
        <button class="ctrl player-action-btn" id="playerShareBtn" title="Поделиться">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
        </button>
        <button class="ctrl player-action-btn action-btn download-btn" id="playerDownloadBtn" title="Скачать">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="player-center">
      <!-- Mobile-only: track name above controls -->
      <div class="mobile-track-title" id="mobileTrackTitle">Выберите трек</div>

      <div class="player-controls">
        <button class="ctrl" id="shuffleBtn" title="Перемешать">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="16 3 21 3 21 8"/>
            <line x1="4" y1="20" x2="21" y2="3"/>
            <polyline points="21 16 21 21 16 21"/>
            <line x1="15" y1="15" x2="21" y2="21"/>
          </svg>
        </button>
        <button class="ctrl" id="prevBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
          </svg>
        </button>
        <button class="ctrl play-btn" id="playBtn">
          <svg id="playIcon"  width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="pauseIcon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="ctrl" id="nextBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/>
          </svg>
        </button>
        <button class="ctrl" id="repeatBtn" title="Повтор">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="17 1 21 5 17 9"/>
            <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
            <polyline points="7 23 3 19 7 15"/>
            <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
          </svg>
        </button>
      </div>

      <div class="progress-area">
        <span class="time" id="currentTime">0:00</span>
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="time" id="duration">0:00</span>
      </div>
    </div>

    <div class="player-right">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
      </svg>
      <input type="range" id="volumeSlider" min="0" max="100" value="80" class="volume-slider"/>
    </div>
  </div>

  <!-- ── BOTTOM NAV ─────────────────────────────────────────── -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-view="wave">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M2 12 Q4 6 6 12 Q8 18 10 12 Q12 6 14 12 Q16 18 18 12 Q20 6 22 12"/>
      </svg>
      <span>Волна</span>
    </button>
    <button class="nav-item" data-view="search">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <span>Поиск</span>
    </button>
    <button class="nav-item" data-view="favorites">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <span>Избранное</span>
    </button>
    <button class="nav-item auth-nav-item" id="authBtn">
      🔐 Войти
    </button>
  </nav>

</div>

<!-- Inline script for mood tabs (no module needed) -->
<script>
function selectMood(btn) {
  document.querySelectorAll('.mood-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('waveMood').value = btn.dataset.mood;
}
</script>

<script type="module" src="app.js"></script>
</body>
</html>
